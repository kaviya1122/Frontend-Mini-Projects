<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
        }

        .calculator {
            background-color: #fafafa;
            border: 6px solid #111111;
            border-radius: 16px;
            padding: 24px;
            width: 340px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .display {
            width: 100%;
            height: 70px;
            background-color: #ffffff;
            border: 2px solid #111111;
            border-radius: 8px;
            margin-bottom: 24px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            font-size: 2rem;
            color: #111111;
            overflow-x: auto;
            white-space: nowrap;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 60px;
            font-size: 1.25rem;
            font-weight: 600;
            background-color: #ffffff;
            border: 2px solid #111111;
            border-radius: 8px;
            color: #111111;
            cursor: pointer;
            transition: all 0.1s ease;
            position: relative;
            top: 0;
            box-shadow: 0 4px 0 #111111;
        }

        /* Dynamic 3D click feel */
        button:active {
            top: 4px;
            box-shadow: 0 0px 0 #111111;
        }

        button.operator {
            background-color: #c7b658;
        }

        button.clear {
            background-color: #e2505c;
        }

        button.equal {
            background-color: #52914a;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display" id="screen">0</div>
        <div class="grid">
            <button class="clear" onclick="press('C')">C</button>
            <button class="operator" onclick="press('/')">/</button>
            <button class="operator" onclick="press('*')">*</button>
            <button class="operator" onclick="press('-')">-</button>

            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button class="operator" onclick="press('+')">+</button>

            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button class="equal" style="grid-row: span 2; height: 132px;" onclick="press('=')">=</button>

            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>

            <button style="grid-column: span 2;" onclick="press('0')">0</button>
            <button onclick="press('.')">.</button>
        </div>
    </div>

    <script>
        let currentInput = "0";

        function updateDisplay() {
            document.getElementById("screen").innerText = currentInput;
        }

        // Main function utilizing a switch-case statement
        function press(value) {
            switch(value) {
                case 'C':
                    currentInput = "0";
                    break;
                    
                case '=':
                    try {
                        // Evaluate the string expression safely
                        let result = Function('"use strict";return (' + currentInput + ')')();
                        currentInput = String(result);
                    } catch (error) {
                        currentInput = "Error";
                    }
                    break;

                default:
                    if (currentInput === "0" && value !== '.') {
                        currentInput = value;
                    } else {
                        currentInput += value;
                    }
                    break;
            }
            updateDisplay();
        }
    </script>
</body>
</html>
