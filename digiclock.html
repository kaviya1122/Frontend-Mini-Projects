<!DOCTYPE html>
<html>
<head>
    <title>Digital Clock</title>

    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:black;
            color:lime;
            font-size:60px;
            font-family:Arial;
        }
    </style>
</head>

<body>

<div id="clock"></div>

<script>

function showTime(){

    let date = new Date();

    let time = date.toLocaleTimeString();

    document.getElementById("clock").innerHTML = time;
}

setInterval(showTime,1000);

</script>

</body>
</html>
