<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            padding-top: 50px; 
            background: #f4f4f4; 
        }
        .todo-container { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            width: 300px; 
        }
        input {
            padding: 8px;
            width: 70%;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 8px 12px;
            cursor: pointer;
        }
        ul {
            padding: 0;
        }
        li { 
            list-style: none; 
            padding: 10px; 
            border-bottom: 1px solid #eee; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .delete-btn { 
            color: red; 
            cursor: pointer; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="todo-container">
        <h1>To-Do List</h1>
        <input type="text" id="todo-input" placeholder="Add task...">
        <button onclick="addTask()">Add</button>
        <ul id="todo-list"></ul>
    </div>

    <script>
        const input = document.getElementById("todo-input");
        const list = document.getElementById("todo-list");

        function addTask() {
            if (input.value.trim() === "") return;
            
            const li = document.createElement("li");
            li.innerHTML = `
                <span>${input.value}</span> 
                <span class="delete-btn" onclick="this.parentElement.remove()">X</span>
            `;
            
            list.appendChild(li);
            input.value = "";
        }

        // Optional: Allows pressing "Enter" key to add a task
        input.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                addTask();
            }
        });
    </script>

</body>
</html>
